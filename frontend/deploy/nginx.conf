##
## SCADA Mobile — шаблон конфигурации Nginx для внутреннего сервера компании.
##
## Скопируйте этот файл в /etc/nginx/sites-available/scada-mobile
## и замените SERVER_NAME и DIST_PATH своими значениями.
##
## Предполагается, что фронтенд собран командой `npm run build`
## и артефакты лежат в frontend/dist/.
##

server {
    listen 80;
    server_name SERVER_NAME;   # ← замените на IP/hostname внутреннего сервера

    # Путь до папки dist после `npm run build`
    root DIST_PATH;            # ← например /srv/scada-mobile/frontend/dist
    index index.html;

    # ── Сжатие ────────────────────────────────────────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Кэш: index.html — никогда не кэшировать ───────────────────────
    # Клиент ВСЕГДА получает свежий HTML после деплоя.
    # В HTML — ссылки на Vite-бандлы с хэшами; свежий HTML = свежий фронт.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Кэш: service-worker.js — никогда не кэшировать ────────────────
    # Браузер проверяет SW по byte-diff при каждом визите.
    # Без этого обновление SW может задержаться до 24 часов.
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Кэш: manifest.webmanifest — короткий TTL ──────────────────────
    # Позволяет обновлять иконки / название за ≤ 1 час без полного сброса.
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600";
        default_type application/manifest+json;
    }

    # ── Кэш: Vite-assets с хэшами — immutable, год ────────────────────
    # Vite генерирует уникальный хэш в имени каждого файла при сборке.
    # Новая версия кода = новый URL → можно кэшировать безопасно.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── TWA: Digital Asset Links ───────────────────────────────────────
    # assetlinks.json лежит в public/well-known/ (без точки в имени папки).
    # Nginx отдаёт его по каноничному URL /.well-known/assetlinks.json,
    # который Chrome требует для верификации TWA (убирает адресную строку).
    location ^~ /.well-known/ {
        alias DIST_PATH/well-known/;  # ← тот же DIST_PATH, что и root выше
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/json";
    }

    # ── SPA fallback ───────────────────────────────────────────────────
    # React Router использует History API — все пути отдаём через index.html.
    # Nginx сначала ищет файл на диске, иначе — отдаёт index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
