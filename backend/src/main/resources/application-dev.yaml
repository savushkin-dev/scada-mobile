# Dev profile: подробные логи (DEBUG), медленный polling, включенная документация OpenAPI
# Уровни логов задаются в logback-spring.xml (springProfile name="dev")
# При необходимости можно переопределить через Actuator: POST /actuator/loggers/{name}

# ─────────────────────────────────────────────────────────────────────────────
# PrintSrv instances в dev:
#   host/port берутся из application.yaml (127.0.0.1 + порты 556x/557x).
#   Варианты запуска:
#     1) Реальный PrintSrv на той же машине — ничего не менять.
#     2) PrintSrv на удалённой машине — пробросить SSH-туннель:
#          ssh -L 5561:localhost:5561 ... -L 5577:localhost:5577 user@prod-host
#        Тогда localhost-порты из application.yaml сработают без изменений.
#     3) Для тестирования без PrintSrv — используйте мок-клиенты и offline-instances.
# ─────────────────────────────────────────────────────────────────────────────

printsrv:
  polling:
    fixed-delay-ms: 500  # Dev: задержка между проходами каждого instance worker

  # ─────────────────────────────────────────────────────────────────────────
  # MockPrintSrv — используется ТОЛЬКО в профиле dev.
  # Все инстансы берутся из printsrv.instances (см. application.yaml).
  # ─────────────────────────────────────────────────────────────────────────
  mock:
    # Путь к директории со snapshot-файлами вида {instanceId}/{Device}___Unit0.xml.
    # Если пусто или файл не найден — берётся classpath:mock-snapshots/default/.
    # Пример: snapshot-base-dir: "C:/PrintSrv/snapshots"
    snapshot-base-dir:

    # Интервал между тиками симуляции (мс). Увеличьте при отладке, чтобы
    # состояние менялось реже.
    tick-interval-ms: 20000

    # Список instanceId, которые должны стартовать как «offline» (имитация обрыва TCP).
    # Пример: offline-instances: [grunwald8, bosch]
    offline-instances: []

    # Вероятность в диапазоне [0.0, 1.0]: при каждом тике каждый неактивный Error-флаг
    # на устройствах scada / Line устанавливается (0→1) с этой вероятностью.
    # Применяется только если число активных ошибок на аппарате < max-errors-per-unit.
    error-flip-probability: 0.03

    # Вероятность в диапазоне [0.0, 1.0]: при каждом тике каждый активный Error-флаг
    # (1) снимается с этой вероятностью (1→0). Должна быть выше error-flip-probability,
    # чтобы ошибки не висели вечно. При значении 0.10 и тике 2 сек ожидаемое
    # «время жизни» ошибки ≈ 20 сек.
    error-clear-probability: 0.2

    # Максимальное число одновременно активных error-флагов на устройстве scada
    # одного аппарата. Новые ошибки не появятся, пока не снизится активное количество.
    # Примеры: 1 — строгий (по одной), 3 — умеренный, 10+ — для стресс-теста UI.
    max-errors-per-unit: 1

    # Random-seed для воспроизводимого поведения в unit-тестах.
    # Сменить здесь — изменить все ожидаемые значения в тестах.
    random-seed: 42

    # Быстрый выключатель симуляции без пересборки.
    simulation-enabled: true

# CORS: dev — только allowed-origins переопределяем здесь.
# Остальные поля (allowed-methods, allowed-headers, allow-credentials, max-age-seconds)
# наследуются из application.yaml — не дублируем.
cors:
  policy:
    allowed-origins:
      - "http://127.0.0.1:5500"   # VS Code Live Server
      - "http://localhost:5500"   # Live Server (альтернативный хост)
      - "http://localhost:5173"   # Vite dev server (npm run dev)
      - "http://127.0.0.1:5173"  # Vite dev server (альтернативный хост)
      - "https://conchita-semidefined-cuckoldly.ngrok-free.dev/"

# OpenAPI/Swagger UI: включено для разработки
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: true

