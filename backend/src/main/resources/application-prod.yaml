# Prod profile: минимальное логирование, быстрый polling, документация отключена
# Уровни логов задаются в logback-spring.xml (springProfile name="prod").
# Переопределить без перезапуска: POST /actuator/loggers/dev.savushkin.scada.mobile.backend
#   {"configuredLevel": "DEBUG"}  ← включить отладку при инциденте
#   {"configuredLevel": "INFO"}   ← вернуть обратно
logging:
  level:
    root: WARN
    dev.savushkin.scada.mobile.backend: INFO

# ─────────────────────────────────────────────────────────────────────────────
# PrintSrv instances в prod:
#   Топология (id, displayName, workshopId) и справочник workshops берутся
#   из application.yaml — не дублируем.
#   Здесь переопределяем ТОЛЬКО host и port для каждого инстанса через
#   переменные окружения. Индексы соответствуют порядку списка в application.yaml.
#
#   Установить перед запуском (пример для systemd EnvironmentFile или docker-compose):
#     PRINTSRV_HOST_0=192.168.1.10   PRINTSRV_PORT_0=10101
#     PRINTSRV_HOST_1=192.168.1.10   PRINTSRV_PORT_1=10102
#     ... и т.д. для всех 14 инстансов
#
#   Если переменная не задана — инстанс будет недоступен при старте
#   (приложение стартует, остальные инстансы работают нормально).
# ─────────────────────────────────────────────────────────────────────────────
printsrv:
  instances:
    # Цех десертов (BR1_Marking_Dess.mpr)
    - id: "trepko1"
      host: "${PRINTSRV_HOST_0}"
      port: "${PRINTSRV_PORT_0}"
      workshopId: "dess"
    - id: "trepko2"
      host: "${PRINTSRV_HOST_1}"
      port: "${PRINTSRV_PORT_1}"
      workshopId: "dess"
    - id: "hassia1"
      host: "${PRINTSRV_HOST_2}"
      port: "${PRINTSRV_PORT_2}"
      workshopId: "dess"
    - id: "hassia2"
      host: "${PRINTSRV_HOST_3}"
      port: "${PRINTSRV_PORT_3}"
      workshopId: "dess"
    - id: "hassia4"
      host: "${PRINTSRV_HOST_4}"
      port: "${PRINTSRV_PORT_4}"
      workshopId: "dess"
    - id: "hassia5"
      host: "${PRINTSRV_HOST_5}"
      port: "${PRINTSRV_PORT_5}"
      workshopId: "dess"
    - id: "hassia6"
      host: "${PRINTSRV_HOST_6}"
      port: "${PRINTSRV_PORT_6}"
      workshopId: "dess"
    # Цех десертов и розлива (BR1_Marking_Dess_Pouring.mpr)
    - id: "grunwald1"
      host: "${PRINTSRV_HOST_7}"
      port: "${PRINTSRV_PORT_7}"
      workshopId: "dess_pouring"
    - id: "grunwald2"
      host: "${PRINTSRV_HOST_8}"
      port: "${PRINTSRV_PORT_8}"
      workshopId: "dess_pouring"
    - id: "hassia3"
      host: "${PRINTSRV_HOST_9}"
      port: "${PRINTSRV_PORT_9}"
      workshopId: "dess_pouring"
    - id: "bosch"
      host: "${PRINTSRV_HOST_10}"
      port: "${PRINTSRV_PORT_10}"
      workshopId: "dess_pouring"
    - id: "grunwald5"
      host: "${PRINTSRV_HOST_11}"
      port: "${PRINTSRV_PORT_11}"
      workshopId: "dess_pouring"
    - id: "grunwald8"
      host: "${PRINTSRV_HOST_12}"
      port: "${PRINTSRV_PORT_12}"
      workshopId: "dess_pouring"
    - id: "grunwald11"
      host: "${PRINTSRV_HOST_13}"
      port: "${PRINTSRV_PORT_13}"
      workshopId: "dess_pouring"

  polling:
    fixed-delay-ms: 500  # Prod: быстрый цикл (0.5 секунды)
  socket:
    # 1000ms достаточно для LAN-соединения в пределах одного предприятия.
    # Снижение с 5000ms критично: при 14 инстансах и 3 недоступных
    # один scan-цикл мог блокироваться до 15 секунд; теперь — не более 3 секунд.
    connect-timeout-ms: 1000
    read-timeout-ms: 1000

# CORS: prod — только allowed-origins переопределяем здесь.
# Остальные поля наследуются из application.yaml — не дублируем.
#
# Задать origins перед запуском (через запятую):
#   CORS_POLICY_ALLOWED_ORIGINS=http://scada.plant.local,https://scada.plant.local
#
# ВАЖНО: если переменная не задана — список пуст (fail-closed),
# cross-origin запросы с браузера будут блокироваться CORS-фильтром.
# Это намеренная безопасная позиция: лучше «не работает» при ошибке конфига,
# чем «открыто всем».
cors:
  policy:
    allowed-origins: "${CORS_POLICY_ALLOWED_ORIGINS:}"

# OpenAPI/Swagger UI: отключено в продакшене из соображений безопасности
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Actuator: только нужные endpoints, закрытые от внешней сети
# health — для liveness/readiness probe (если нет /api/v1/commands/health/*)
# loggers — для изменения уровней логов без перезапуска при инциденте
management:
  endpoints:
    web:
      exposure:
        include: "health,loggers"
  # Рекомендуется: TODO вынести Actuator на отдельный порт и закрыть его файрволлом
  # server:
  #   port: 8081
