    # Цех десертов и розлива (BR1_Marking_Dess_Pouring.mpr)
    - id: "grunwald1"
      host: 127.0.0.1
      port: 5571
      displayName: "Grunwald №1"
      workshopId: "dess_pouring"
    - id: "grunwald2"
      host: 127.0.0.1
      port: 5572
