spring:
  application:
    name: scada.mobile.backend

scada:
  api:
    version: v1.0.0
    base-path: /api/${scada.api.version}


# ─────────────────────────────────────────────────────────────────────────────
# PrintSrv — единственный источник правды о топологии линий и цехов.
#
# workshops / instances — топологические данные, не меняются между окружениями.
# host/port — плейсхолдеры для открытого репозитория. Реальные значения
# задаются вне git. В prod они переопределяются через переменные окружения,
# привязанные к id аппарата (см. application-prod.yaml), например:
#   PRINTSRV_HASSIA4_HOST, PRINTSRV_HASSIA4_PORT
# devices — topology конкретного инстанса PrintSrv. Если блок не задан,
# используются безопасные дефолты для одно-принтерной линии:
#   line=Line, scada=scada, batchQueue=BatchQueue,
#   printers=[Printer11], aggregationCams=[CamAgregation],
#   aggregationBoxCams=[CamAgregationBox], checkerCams=[CamChecker]
# ─────────────────────────────────────────────────────────────────────────────
printsrv:
  # Справочник цехов: id → displayName.
  # instances ссылаются на workshopId — изменить название цеха нужно только здесь.
  workshops:
    - id: "dess"
      displayName: "Цех десертов"
    - id: "dess_pouring"
      displayName: "Цех розлива"

  instances:
    # Цех десертов (BR1_Marking_Dess.mpr)
    - id: "trepko1"
      host: 999.9.9.9
      port: 9999
      displayName: "Trepko №1"
      workshopId: "dess"
      devices:
        printers: []
        aggregationCams: [ "CamBatch" ]
        aggregationBoxCams: [ "CamPacker", "CamPackerBox" ]
        checkerCams: [ "CamChecker" ]
    - id: "trepko2"
      host: 999.9.9.9
      port: 9999
      displayName: "Trepko №2"
      workshopId: "dess"
      devices:
        printers: []
        aggregationCams: [ "CamBatch" ]
        aggregationBoxCams: [ "CamPacker", "CamPackerBox" ]
        checkerCams: [ "CamChecker" ]
    - id: "hassia1"
      host: 999.9.9.9
      port: 9999
      displayName: "Hassia №1"
      workshopId: "dess"
    - id: "hassia2"
      host: 999.9.9.9
      port: 9999
      displayName: "Hassia №2"
      workshopId: "dess"
    - id: "hassia4"
      host: 999.9.9.9
      port: 9999
      displayName: "Hassia №4"
      workshopId: "dess"
      devices:
        printers: [ "Printer11", "Printer12", "Printer2" ]
    - id: "hassia5"
      host: 999.9.9.9
      port: 9999
      displayName: "Hassia №5"
      workshopId: "dess"
      devices:
        printers: [ "Printer11", "Printer12" ]
    - id: "hassia6"
      host: 999.9.9.9
      port: 9999
      displayName: "Hassia №6"
      workshopId: "dess"
      devices:
        printers: [ "Printer11", "Printer12" ]
    # Цех десертов (часть установок из BR1_Marking_Dess_Pouring.mpr)
    - id: "hassia3"
      host: 999.9.9.9
      port: 9999
      displayName: "Hassia №3"
      workshopId: "dess"
      devices:
        printers: [ "Printer11", "Printer12" ]
    - id: "bosch"
      host: 999.9.9.9
      port: 9999
      displayName: "Bosch"
      workshopId: "dess"
      devices:
        printers: [ "Printer11", "Printer12" ]
    - id: "grunwald5"
      host: 999.9.9.9
      port: 9999
      displayName: "Grunwald №5"
      workshopId: "dess"
      devices:
        printers: [ "Printer11", "Printer12" ]
    - id: "grunwald8"
      host: 999.9.9.9
      port: 9999
      displayName: "Grunwald №8"
      workshopId: "dess"
      devices:
        printers: [ "Printer11", "Printer12" ]
    # Цех розлива (установки из BR1_Marking_Dess_Pouring.mpr)
    - id: "grunwald1"
      host: 999.9.9.9
      port: 9999
      displayName: "Grunwald №1"
      workshopId: "dess_pouring"
      devices:
        printers: [ "Printer11", "Printer12" ]
        checkerCams: [ "CamChecker", "CamEanChecker1", "CamEanChecker2", "CamEanChecker3", "CamEanChecker4" ]
    - id: "grunwald2"
      host: 999.9.9.9
      port: 9999
      displayName: "Grunwald №2"
      workshopId: "dess_pouring"
      devices:
        printers: [ "Printer11", "Printer12" ]
        checkerCams: [ "CamChecker", "CamEanChecker1", "CamEanChecker2", "CamEanChecker3", "CamEanChecker4" ]
    - id: "grunwald11"
      host: 999.9.9.9
      port: 9999
      displayName: "Grunwald №11"
      workshopId: "dess_pouring"
      devices:
        printers: [ "Printer11", "Printer12", "Printer13", "Printer14" ]
        aggregationCams: [ "CamAgregation1", "CamAgregation2" ]
        aggregationBoxCams: [ "CamAgregationBox1", "CamAgregationBox2" ]
        checkerCams: [ "CamChecker1", "CamChecker2", "CamEanChecker1", "CamEanChecker2", "CamEanChecker3", "CamEanChecker4" ]

  polling:
    fixed-delay-ms: 5000            # Задержка между polling-проходами каждого instance worker
  # Таймауты для Socket операций
  socket:
    connect-timeout-ms: 5000
    read-timeout-ms: 5000

# ─────────────────────────────────────────────────────────────────────────────
# CORS — общая политика для всех профилей.
#
# Поля ниже одинаковы в dev и prod — дублировать их в профилях не нужно.
# Единственное, что меняется между окружениями — allowed-origins:
#   dev:  задаётся явным списком в application-dev.yaml
#   prod: задаётся через переменную окружения CORS_POLICY_ALLOWED_ORIGINS
#         (см. application-prod.yaml)
#
# Безопасные дефолты (fail-closed): пустой список origins блокирует любые
# cross-origin запросы с браузера, пока профиль не переопределит значение.
# ─────────────────────────────────────────────────────────────────────────────
cors:
  policy:
    # Переопределяется в каждом профиле — здесь намеренно пусто (fail-closed).
    allowed-origins: [ ]
    # GET — данные, POST — Web Push subscribe (/api/push/subscribe), OPTIONS — preflight.
    allowed-methods: [ "GET", "POST", "PUT", "OPTIONS" ]
    # Content-Type и Authorization — стандартные заголовки запроса.
    # If-None-Match и If-Match — заголовки условного запроса (RFC 7232);
    # необходимы для ETag-кэширования topology-эндпоинтов.
    # Без явного разрешения браузер отклоняет preflight с этими заголовками.
    allowed-headers: [ "Content-Type", "Authorization", "If-None-Match", "If-Match", "X-User-Id" ]
    # ETag добавляется автоматически в CorsConfig.mergeWithETag() — не дублируем здесь.
    exposed-headers: [ ]
    # Включать только при cookie-based auth; с wildcard origins несовместимо.
    allow-credentials: false
    # Preflight кэшируется браузером 1 час.
    max-age-seconds: 3600

# ─────────────────────────────────────────────────────────────────────────────
# JWT — конфигурация токенов аутентификации.
#
# access-secret / refresh-secret: минимум 256 бит в Base64.
# В prod задаются через переменные окружения JWT_ACCESS_SECRET / JWT_REFRESH_SECRET.
# Генерация: openssl rand -base64 32
# ─────────────────────────────────────────────────────────────────────────────
jwt:
  access-secret: "${JWT_ACCESS_SECRET:}"
  refresh-secret: "${JWT_REFRESH_SECRET:}"
  access-expiration-minutes: 15
  refresh-expiration-days: 7
  public-paths:
    - "/api/**/auth/login"
    - "/api/**/auth/logout"
    - "/api/**/auth/refresh"
    - "/actuator/**"
    - "/ws/**"

# Логирование — конфигурация в src/main/resources/logback-spring.xml
# Уровни переопределяются по профилям (dev / prod) в logback-spring.xml
