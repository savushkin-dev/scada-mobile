  polling:
    fixed-delay-ms: 5000              # Интервал scan cycle (fixedDelay) — переопределяется в профилях
  # Retry — базовые значения, профили могут ужесточить
  retry:
    max-attempts: 5
    initial-delay-ms: 200
    max-delay-ms: 5000
    recovery-check-interval-ms: 60000
  # Таймауты для Socket операций
  socket:
    connect-timeout-ms: 5000
    read-timeout-ms: 5000

# ─────────────────────────────────────────────────────────────────────────────
# CORS — общая политика для всех профилей.
#
# Поля ниже одинаковы в dev и prod — дублировать их в профилях не нужно.
# Единственное, что меняется между окружениями — allowed-origins:
#   dev:  задаётся явным списком в application-dev.yaml
#   prod: задаётся через переменную окружения CORS_POLICY_ALLOWED_ORIGINS
#         (см. application-prod.yaml)
#
# Безопасные дефолты (fail-closed): пустой список origins блокирует любые
# cross-origin запросы с браузера, пока профиль не переопределит значение.
# ─────────────────────────────────────────────────────────────────────────────
cors:
  policy:
    # Переопределяется в каждом профиле — здесь намеренно пусто (fail-closed).
    allowed-origins: [ ]
    # GET — данные, POST — Web Push subscribe (/api/push/subscribe), OPTIONS — preflight.
    allowed-methods: [ "GET", "POST", "OPTIONS" ]
    # Content-Type и Authorization — стандартные заголовки запроса.
    # If-None-Match и If-Match — заголовки условного запроса (RFC 7232);
    # необходимы для ETag-кэширования topology-эндпоинтов.
    # Без явного разрешения браузер отклоняет preflight с этими заголовками.
    allowed-headers: [ "Content-Type", "Authorization", "If-None-Match", "If-Match" ]
    # ETag добавляется автоматически в CorsConfig.mergeWithETag() — не дублируем здесь.
    exposed-headers: [ ]
    # Включать только при cookie-based auth; с wildcard origins несовместимо.
    allow-credentials: false
    # Preflight кэшируется браузером 1 час.
    max-age-seconds: 3600

# Логирование — конфигурация в src/main/resources/logback-spring.xml
# Уровни переопределяются по профилям (dev / prod) в logback-spring.xml
