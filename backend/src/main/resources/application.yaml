    - id: "hassia4"
      host: 127.0.0.1
      port: 5565
      displayName: "Hassia №4"
      workshopId: "dess"
    - id: "hassia5"
      host: 127.0.0.1
      port: 5566
      displayName: "Hassia №5"
      workshopId: "dess"
    - id: "hassia6"
      host: 127.0.0.1
