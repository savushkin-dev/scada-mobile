spring:
  application:
    name: scada.mobile.backend

scada:
  api:
    version: v1.0.0
    base-path: /api/${scada.api.version}


# ─────────────────────────────────────────────────────────────────────────────
# PrintSrv — единственный источник правды о топологии линий и цехов.
#
# workshops / instances — топологические данные, не меняются между окружениями.
# host/port — значения по умолчанию для локальной разработки (localhost-туннель
# или моки). В prod они переопределяются через переменные окружения:
#   PRINTSRV_INSTANCES_0_HOST, PRINTSRV_INSTANCES_0_PORT
#   PRINTSRV_INSTANCES_1_HOST, PRINTSRV_INSTANCES_1_PORT  … и т.д.
# ─────────────────────────────────────────────────────────────────────────────
printsrv:
  # Справочник цехов: id → displayName.
  # instances ссылаются на workshopId — изменить название цеха нужно только здесь.
  workshops:
    - id: "dess"
      displayName: "Цех десертов"
    - id: "dess_pouring"
      displayName: "Цех десертов и розлива"

  instances:
    # Цех десертов (BR1_Marking_Dess.mpr)
